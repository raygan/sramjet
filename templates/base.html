<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRAMjet{% block title %}{% endblock %}</title>
  <link rel="icon" type="image/png" href="/static/icons/jet.png">
  <link rel="apple-touch-icon" href="/static/icons/jet.png">
  <link rel="manifest" href="/static/site.webmanifest">
  <meta name="theme-color" content="#1f2937">
  <script>
    // Apply dark class before page renders to avoid flash.
    // Default to dark when device preference is unknown.
    if (!window.matchMedia('(prefers-color-scheme: light)').matches) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">
  <nav class="bg-gray-800 text-white sticky top-0 z-50">
    <div class="px-4 py-2 flex items-center gap-6 text-sm">
      <a href="/" class="flex items-center gap-2 font-bold hover:text-gray-300 shrink-0">
        <img src="/static/icons/jet.png" alt="SRAMjet" class="w-7 h-7">
        SRAMjet
      </a>
      <!-- Desktop links -->
      <div class="hidden sm:flex items-center gap-6 flex-1">
        <a href="/timeline" class="hover:text-gray-300">Timeline</a>
        <a href="/games" class="hover:text-gray-300">Games</a>
        <a href="/devices" class="hover:text-gray-300">Devices</a>
        <a href="/files" class="hover:text-gray-300">Files</a>
        <a href="/help" class="hover:text-gray-300 ml-auto">Help</a>
      </div>
      <!-- Mobile hamburger -->
      <button class="sm:hidden ml-auto p-1 rounded hover:bg-gray-700 focus:outline-none"
              onclick="document.getElementById('mobile-menu').classList.toggle('hidden')"
              aria-label="Toggle menu">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>
    <!-- Mobile dropdown -->
    <div id="mobile-menu" class="hidden sm:hidden border-t border-gray-700 px-4 py-2 flex flex-col text-sm">
      <a href="/timeline" class="py-2 hover:text-gray-300">Timeline</a>
      <a href="/games"    class="py-2 hover:text-gray-300">Games</a>
      <a href="/devices"  class="py-2 hover:text-gray-300">Devices</a>
      <a href="/files"    class="py-2 hover:text-gray-300">Files</a>
      <a href="/help"     class="py-2 hover:text-gray-300">Help</a>
    </div>
  </nav>
  <main class="max-w-4xl mx-auto px-4 py-6 flex-1 w-full">
    {% block content %}{% endblock %}
  </main>
  <footer class="text-center text-xs text-gray-400 dark:text-gray-600 py-3">
    Icons by <a href="https://www.flaticon.com/authors/kawaii/lineal-color" class="underline hover:text-gray-600 dark:hover:text-gray-400" target="_blank" rel="noopener">Freepik</a>
  </footer>

  <!-- Lightbox -->
  <div id="lightbox" class="fixed inset-0 bg-black bg-opacity-80 hidden items-center justify-center z-50 cursor-pointer" onclick="this.classList.add('hidden'); this.classList.remove('flex')">
    <img id="lightbox-img" src="" class="rounded shadow-xl" style="image-rendering: pixelated; max-width: 100vw;">
  </div>
  <script>
    function relativeTime(iso) {
      const diff = (Date.now() - new Date(iso)) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      if (diff < 86400 * 7) return Math.floor(diff / 86400) + 'd ago';
      return null;
    }
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('[data-ts]').forEach(el => {
        const rel = relativeTime(el.dataset.ts);
        if (rel) {
          el.title = el.textContent;
          el.textContent = rel;
        }
      });
    });

    function openLightbox(src) {
      const lb = document.getElementById('lightbox');
      const img = document.getElementById('lightbox-img');
      img.style.width = '';
      img.style.height = '';
      img.src = src;
      function sizeImage() {
        const w = Math.min(img.naturalWidth * 4, window.innerWidth);
        img.style.width = w + 'px';
        img.style.height = 'auto';
      }
      if (img.complete && img.naturalWidth > 0) {
        sizeImage();
      } else {
        img.onload = sizeImage;
      }
      lb.classList.remove('hidden');
      lb.classList.add('flex');
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        const lb = document.getElementById('lightbox');
        lb.classList.add('hidden');
        lb.classList.remove('flex');
      }
    });
  </script>
</body>
</html>
