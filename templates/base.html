<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRAMjet{% block title %}{% endblock %}</title>
  <link rel="icon" type="image/png" href="/static/icons/jet.png">
  <link rel="apple-touch-icon" href="/static/icons/jet.png">
  <link rel="manifest" href="/static/site.webmanifest">
  <meta name="theme-color" content="#1f2937">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">
  <nav class="bg-gray-800 text-white px-4 py-2 flex items-center gap-6 text-sm">
    <a href="/" class="flex items-center gap-2 font-bold hover:text-gray-300">
      <img src="/static/icons/jet.png" alt="SRAMjet" class="w-7 h-7">
      SRAMjet
    </a>
    <a href="/timeline" class="hover:text-gray-300">Timeline</a>
    <a href="/games" class="hover:text-gray-300">Games</a>
    <a href="/devices" class="hover:text-gray-300">Devices</a>
    <a href="/files" class="hover:text-gray-300">Files</a>
  </nav>
  <main class="max-w-4xl mx-auto px-4 py-6 flex-1 w-full">
    {% block content %}{% endblock %}
  </main>
  <footer class="text-center text-xs text-gray-400 py-3">
    Jet icon by <a href="https://www.flaticon.com/free-icon/jet_3301513" class="underline hover:text-gray-600" target="_blank" rel="noopener">Flaticon</a>
  </footer>

  <!-- Lightbox -->
  <div id="lightbox" class="fixed inset-0 bg-black bg-opacity-80 hidden items-center justify-center z-50 cursor-pointer" onclick="this.classList.add('hidden'); this.classList.remove('flex')">
    <img id="lightbox-img" src="" class="max-w-full max-h-full rounded shadow-xl" style="image-rendering: pixelated;">
  </div>
  <script>
    function relativeTime(iso) {
      const diff = (Date.now() - new Date(iso)) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      if (diff < 86400 * 7) return Math.floor(diff / 86400) + 'd ago';
      return null; // use formatted string for older
    }
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('[data-ts]').forEach(el => {
        const rel = relativeTime(el.dataset.ts);
        if (rel) {
          el.title = el.textContent;
          el.textContent = rel;
        }
      });
    });

    function openLightbox(src) {
      const lb = document.getElementById('lightbox');
      document.getElementById('lightbox-img').src = src;
      lb.classList.remove('hidden');
      lb.classList.add('flex');
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        const lb = document.getElementById('lightbox');
        lb.classList.add('hidden');
        lb.classList.remove('flex');
      }
    });
  </script>
</body>
</html>
